name: Build APK Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer
      options: --user root

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p /github/home/.buildozer/android/platform/android-sdk
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        yes | /github/home/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true

    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug 2>&1 | tee build.log || true

    - name: Check Output
      run: |
        echo "Checking build output..."
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: work-hour-calculator-apk
        path: |
          bin/*.apk
          *.apk
        retention-days: 30
        if-no-files-found: warn

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
        if-no-files-found: ignore
