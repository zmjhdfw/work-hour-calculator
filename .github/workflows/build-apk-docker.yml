name: Build APK with Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build APK using Docker
      run: |
        docker run --rm \
          -v "$PWD":/home/user/app \
          -w /home/user/app \
          --user root \
          -e BUILDOZER_WARN_ON_ROOT=1 \
          kivy/buildozer \
          bash -c "buildozer android debug || true"

    - name: List built files
      run: |
        ls -la bin/ || echo "No bin directory found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: work-hour-calculator-apk
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: warn
