name: Build APK with BeeWare

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Java
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

    - name: Install Briefcase
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install briefcase
        briefcase --version

    - name: Create Android Project
      run: |
        briefcase create android --no-input
      continue-on-error: false

    - name: Build APK
      run: |
        briefcase build android --no-input
      continue-on-error: false

    - name: List APK files
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la build/workhourcalculator/android/gradle/workhourcalculator/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: work-hour-calculator-apk
        path: |
          build/workhourcalculator/android/gradle/workhourcalculator/build/outputs/apk/**/*.apk
          **/*.apk
        if-no-files-found: error
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/workhourcalculator/android/gradle/workhourcalculator/build/outputs/apk/**/*.apk
          **/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
