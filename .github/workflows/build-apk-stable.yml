name: Build APK Final Attempt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-11-jdk \
          autoconf automake libtool pkg-config \
          libncurses5-dev libncursesw5-dev \
          libtinfo-dev cmake libffi-dev \
          libssl-dev build-essential \
          lsb-release wget

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install cython==0.29.36
        pip install buildozer==1.5.0

    - name: Configure Buildozer
      run: |
        # 更新buildozer.spec使用更稳定的配置
        sed -i 's/android.api = 31/android.api = 30/' buildozer.spec
        sed -i 's/android.minapi = 21/android.minapi = 21/' buildozer.spec
        sed -i 's/android.ndk = 25b/android.ndk = 25c/' buildozer.spec

    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
        
        # 清理之前的构建
        rm -rf .buildozer bin
        
        # 开始构建
        buildozer android debug 2>&1 | tee build.log

    - name: Check Result
      run: |
        if ls bin/*.apk 1> /dev/null 2>&1; then
          echo "✅ APK构建成功！"
          ls -lh bin/*.apk
        else
          echo "❌ APK构建失败"
          tail -200 build.log
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: work-hour-calculator-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
