name: Build APK with Full Log

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          libncurses5-dev libncursesw5-dev \
          libtinfo-dev cmake libffi-dev \
          libssl-dev automake build-essential \
          lsb-release wget

    - name: Install Buildozer
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython buildozer

    - name: Show Buildozer Spec
      run: |
        echo "=== buildozer.spec 内容 ==="
        cat buildozer.spec

    - name: Build APK with Debug
      run: |
        # 设置环境变量
        export BUILDOZER_WARN_ON_ROOT=0
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        
        # 显示配置
        echo "=== 环境信息 ==="
        echo "Python: $(python --version)"
        echo "Java: $(java -version 2>&1 | head -1)"
        echo "Buildozer: $(buildozer --version)"
        
        # 运行buildozer（详细日志）
        echo "=== 开始构建APK ==="
        buildozer android debug 2>&1 | tee build.log
        
        echo "=== 构建结束 ==="

    - name: Check Output
      run: |
        echo "=== 检查构建输出 ==="
        ls -la bin/ 2>/dev/null || echo "bin目录不存在"
        find . -name "*.apk" -type f 2>/dev/null || echo "未找到APK文件"
        
        if ls bin/*.apk 1> /dev/null 2>&1; then
          echo "✅ APK构建成功！"
          ls -lh bin/*.apk
        else
          echo "❌ APK构建失败"
          echo "=== 最后100行日志 ==="
          tail -100 build.log
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: work-hour-calculator-apk
        path: bin/*.apk
        retention-days: 30

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
